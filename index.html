  <style>
    /* =========================================
       RESET & CUSTOM PROPERTIES
    ========================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-950: #052e16;
      --green-900: #14532d;
      --green-800: #166534;
      --green-700: #15803d;
      --green-600: #16a34a;
      --green-200: #bbf7d0;
      --green-100: #dcfce7;
      --green-50:  #f0fdf4;
      --white:     #ffffff;
      --gray-50:   #f9fafb;
      --gray-100:  #f3f4f6;
      --gray-200:  #e5e7eb;
      --gray-300:  #d1d5db;
      --gray-400:  #9ca3af;
      --gray-500:  #6b7280;
      --gray-700:  #374151;
      --gray-900:  #111827;
      --r-lg:   12px;
      --r-md:    8px;
      --r-sm:    6px;
      --r-full:  9999px;
      --shadow:    0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 8px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.05);
    }

    /* =========================================
       BASE
    ========================================= */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background: var(--green-50);
      color: var(--gray-900);
      line-height: 1.5;
      min-height: 100vh;
    }

    button { font-family: inherit; cursor: pointer; }

    /* =========================================
       HEADER
    ========================================= */
    .site-header {
      background: linear-gradient(150deg, var(--green-950) 0%, var(--green-700) 100%);
      color: var(--white);
      padding: 2.5rem 1.5rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* subtle dot pattern */
    .site-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }

    .site-header-inner { position: relative; }

    .site-header .icon {
      font-size: 3rem;
      line-height: 1;
      display: block;
      margin-bottom: .5rem;
    }

    .site-header h1 {
      font-size: clamp(1.5rem, 5vw, 2.25rem);
      font-weight: 800;
      letter-spacing: -.5px;
      line-height: 1.2;
    }

    .site-header .sub {
      font-size: .9rem;
      opacity: .7;
      margin-top: .375rem;
      letter-spacing: .3px;
    }

    /* =========================================
       LAYOUT
    ========================================= */
    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    .card {
      background: var(--white);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-md);
    }

    /* =========================================
       FILTER CARD
    ========================================= */
    .filter-card {
      padding: 1.25rem 1.5rem;
      margin-bottom: .875rem;
    }

    .filter-block { margin-bottom: 1rem; }
    .filter-block:last-child { margin-bottom: 0; }

    .filter-label {
      display: block;
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--gray-400);
      margin-bottom: .5rem;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: .375rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: .3rem .75rem;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--r-full);
      background: var(--white);
      color: var(--gray-700);
      font-size: .8rem;
      font-weight: 500;
      transition: border-color .12s, background .12s, color .12s;
      white-space: nowrap;
      user-select: none;
    }

    .pill:hover {
      border-color: var(--green-600);
      color: var(--green-700);
    }

    .pill.active {
      background: var(--green-700);
      border-color: var(--green-700);
      color: var(--white);
      font-weight: 600;
    }

    /* =========================================
       STATUS BAR
    ========================================= */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      background: var(--green-100);
      border-radius: var(--r-md);
      padding: .625rem 1rem;
      margin-bottom: .875rem;
      font-size: .875rem;
      color: var(--green-900);
    }

    .status-bar strong { font-weight: 700; }

    .btn-clear {
      flex-shrink: 0;
      background: none;
      border: 1.5px solid var(--green-800);
      color: var(--green-800);
      border-radius: var(--r-full);
      padding: .2rem .65rem;
      font-size: .76rem;
      font-weight: 600;
      transition: background .12s, color .12s;
      white-space: nowrap;
    }

    .btn-clear:hover { background: var(--green-800); color: var(--white); }

    .hidden { display: none !important; }

    /* =========================================
       MATCH TABLE
    ========================================= */
    .table-card { overflow: hidden; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    .matches-table { width: 100%; border-collapse: collapse; }

    .matches-table thead th {
      background: var(--green-900);
      color: var(--white);
      padding: .75rem 1rem;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      text-align: left;
      white-space: nowrap;
    }

    .matches-table tbody tr {
      border-bottom: 1px solid var(--gray-100);
      transition: background .08s;
    }

    .matches-table tbody tr:last-child { border-bottom: none; }
    .matches-table tbody tr:hover td { background: var(--gray-50); }

    .matches-table tbody td {
      padding: .65rem 1rem;
      vertical-align: middle;
      font-size: .875rem;
    }

    .td-nr {
      color: var(--gray-400);
      font-size: .75rem;
      width: 38px;
      padding-right: .5rem;
    }

    .td-time {
      font-weight: 700;
      color: var(--gray-700);
      white-space: nowrap;
      font-size: .9rem;
      font-variant-numeric: tabular-nums;
    }

    .td-result {
      text-align: center;
      font-weight: 700;
      min-width: 70px;
      white-space: nowrap;
    }

    .td-result .dash { color: var(--gray-300); font-weight: 400; }

    /* =========================================
       GROUP BADGE
    ========================================= */
    .group-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: .8rem;
      font-weight: 800;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform .12s, box-shadow .12s;
    }

    .group-badge:hover {
      transform: scale(1.15);
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }

    .g-A        { background: #dbeafe; color: #1e3a8a; }
    .g-B        { background: #fce7f3; color: #831843; }
    .g-C        { background: #ffedd5; color: #7c2d12; }
    .g-D        { background: #ede9fe; color: #4c1d95; }
    .g-E        { background: #d1fae5; color: #064e3b; }
    .g-F        { background: #fdf4ff; color: #701a75; }
    .g-G        { background: #e0e7ff; color: #1e1b4b; }
    .g-H        { background: #fef3c7; color: #78350f; }
    .g-Slutspel { background: #fff7ed; color: #92400e; font-size: .7rem; }

    /* =========================================
       PLAN CHIP
    ========================================= */
    .plan-chip {
      display: inline-block;
      padding: .2rem .55rem;
      background: var(--gray-100);
      border-radius: var(--r-sm);
      font-size: .8rem;
      font-weight: 500;
      color: var(--gray-700);
      cursor: pointer;
      white-space: nowrap;
      transition: background .12s, color .12s;
    }

    .plan-chip:hover { background: var(--green-100); color: var(--green-800); }

    /* =========================================
       TEAM NAME
    ========================================= */
    .team-name {
      cursor: pointer;
      font-weight: 500;
      transition: color .12s;
    }

    .team-name:hover { color: var(--green-700); text-decoration: underline; }

    .team-name.placeholder {
      color: var(--gray-400);
      font-style: italic;
      font-weight: 400;
      cursor: default;
    }

    .team-name.placeholder:hover { color: var(--gray-400); text-decoration: none; }

    /* =========================================
       MATCH TYPE BADGE
    ========================================= */
    .type-badge {
      font-size: .72rem;
      padding: .15rem .45rem;
      border-radius: 4px;
      font-weight: 500;
      white-space: nowrap;
    }

    .type-Gruppspel   { background: var(--gray-100);  color: var(--gray-500); }
    .type-Kvartsfinal { background: #d1fae5; color: #065f46; }
    .type-Semifinal   { background: #e0e7ff; color: #3730a3; }
    .type-Final       { background: #fef3c7; color: #92400e; font-weight: 700; }

    /* =========================================
       EMPTY STATE
    ========================================= */
    .empty-state {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--gray-400);
    }

    .empty-state .empty-icon { font-size: 2rem; margin-bottom: .5rem; }
    .empty-state p { font-size: .875rem; }

    /* =========================================
       FOOTER
    ========================================= */
    .site-footer {
      text-align: center;
      padding: 1.5rem 1rem 2rem;
      font-size: .78rem;
      color: var(--gray-400);
    }

    /* =========================================
       RESPONSIVE
    ========================================= */
    @media (max-width: 600px) {
      .site-header { padding: 2rem 1rem 1.5rem; }
      .container { padding: 1rem .75rem 2rem; }
      .filter-card { padding: 1rem; }
      .matches-table thead th,
      .matches-table tbody td { padding-left: .75rem; padding-right: .75rem; }
    }
  </style>
</head>

// =============================================================
// DERIVED CONSTANTS
// =============================================================
const GROUPS = ["A","B","C","D","E","F","G","H","Slutspel"];

const PLANS = [...new Set(MATCHES.map(m => m.planNr))]
  .sort((a, b) => a - b)
  .map(nr => ({ nr, label: `Plan ${nr}` }));

function isPlaceholder(name) {
  return /^(Vinnare|Finalist)/i.test(name);
}

const TEAMS = [...new Set(MATCHES.flatMap(m => [m.team1, m.team2]))]
  .filter(t => !isPlaceholder(t))
  .sort((a, b) => a.localeCompare(b, "sv"));

// =============================================================
// STATE
// =============================================================
let filter = { type: null, value: null }; // type: 'group' | 'plan' | 'team'

// =============================================================
// RENDERING
// =============================================================

function renderPills() {
  // Groups
  document.getElementById("group-pills").innerHTML = GROUPS.map(g => {
    const active = filter.type === "group" && filter.value === g;
    const label  = g === "Slutspel" ? "🏆 Slutspel" : `Grupp ${g}`;
    return `<button class="pill${active ? " active" : ""}"
                    data-filter-type="group"
                    data-filter-value="${g}">${label}</button>`;
  }).join("");

  // Plans
  document.getElementById("plan-pills").innerHTML = PLANS.map(p => {
    const active = filter.type === "plan" && filter.value === p.nr;
    return `<button class="pill${active ? " active" : ""}"
                    data-filter-type="plan"
                    data-filter-value="${p.nr}">${p.label}</button>`;
  }).join("");

  // Teams
  document.getElementById("team-pills").innerHTML = TEAMS.map(t => {
    const active = filter.type === "team" && filter.value === t;
    return `<button class="pill${active ? " active" : ""}"
                    data-filter-type="team"
                    data-filter-value="${t}">${t}</button>`;
  }).join("");
}

function filteredMatches() {
  if (!filter.type) return MATCHES;
  return MATCHES.filter(m => {
    if (filter.type === "group") return m.group === filter.value;
    if (filter.type === "plan")  return m.planNr === filter.value;
    if (filter.type === "team")  return m.team1  === filter.value || m.team2 === filter.value;
    return true;
  });
}

function teamCell(name) {
  if (isPlaceholder(name)) {
    return `<span class="team-name placeholder">${name}</span>`;
  }
  return `<span class="team-name"
               data-filter-type="team"
               data-filter-value="${name}">${name}</span>`;
}

function renderTable() {
  const rows = filteredMatches();
  const tbody = document.getElementById("matches-body");

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8">
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <p>Inga matcher hittades för det valda filtret.</p>
      </div></td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(m => `
    <tr>
      <td class="td-nr">${m.nr}</td>
      <td class="td-time">${m.time}</td>
      <td>
        <span class="plan-chip"
              data-filter-type="plan"
              data-filter-value="${m.planNr}">Plan ${m.planNr}</span>
      </td>
      <td>
        <span class="group-badge g-${m.group}"
              data-filter-type="group"
              data-filter-value="${m.group}"
              title="Grupp ${m.group}">
          ${m.group === "Slutspel" ? "🏆" : m.group}
        </span>
      </td>
      <td><span class="type-badge type-${m.type}">${m.type}</span></td>
      <td>${teamCell(m.team1)}</td>
      <td class="td-result">${m.result || '<span class="dash">–</span>'}</td>
      <td>${teamCell(m.team2)}</td>
    </tr>`).join("");

  updateStatusBar(rows.length);
}

function updateStatusBar(count) {
  const text    = document.getElementById("status-text");
  const clearBtn = document.getElementById("clear-btn");

  if (!filter.type) {
    text.innerHTML = `Visar <strong>alla ${count} matcher</strong>`;
    clearBtn.classList.add("hidden");
  } else {
    let desc = "";
    if (filter.type === "group") desc = filter.value === "Slutspel" ? "Slutspel" : `Grupp ${filter.value}`;
    if (filter.type === "plan")  desc = `Plan ${filter.value}`;
    if (filter.type === "team")  desc = filter.value;
    text.innerHTML = `Visar <strong>${count} ${count === 1 ? "match" : "matcher"}</strong> för <strong>${desc}</strong>`;
    clearBtn.classList.remove("hidden");
  }
}

function render() {
  renderPills();
  renderTable();
}

// =============================================================
// EVENT HANDLING  (single delegated listener)
// =============================================================
document.addEventListener("click", function (e) {
  const el = e.target.closest("[data-filter-type]");

  // Clear button
  if (e.target.closest("[data-action='clear']")) {
    filter = { type: null, value: null };
    render();
    return;
  }

  if (!el) return;

  const type  = el.dataset.filterType;
  let   value = el.dataset.filterValue;

  // Plans are stored as numbers
  if (type === "plan") value = parseInt(value, 10);

  // Toggle off if same filter clicked again
  if (filter.type === type && filter.value === value) {
    filter = { type: null, value: null };
  } else {
    filter = { type, value };
  }

  render();
});

// =============================================================
// BOOT
// =============================================================
render();
</script>
