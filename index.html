<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KKIF-dagen 2026</title>
  <style>
    /* =========================================
       RESET & CUSTOM PROPERTIES
    ========================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* KKIF club colors */
      --kkif-blue:         #1A5FAD;
      --kkif-blue-dark:    #134a88;
      --kkif-blue-darker:  #0d3360;
      --kkif-blue-light:   #dceaf8;
      --kkif-blue-pale:    #eef4fc;
      --kkif-yellow:       #F5C200;
      --kkif-yellow-light: #fff8d6;
      --kkif-yellow-dark:  #c9a000;
      --kkif-black:        #1a1a1a;

      /* Neutrals */
      --white:    #ffffff;
      --bg:       #f4f6f9;
      --gray-50:  #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;

      --r-lg:   12px;
      --r-md:    8px;
      --r-sm:    6px;
      --r-full:  9999px;
      --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    }

    /* =========================================
       BASE
    ========================================= */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--gray-900);
      line-height: 1.5;
      min-height: 100vh;
    }

    button { font-family: inherit; cursor: pointer; }

    /* =========================================
       HEADER
    ========================================= */
    .site-header {
      background: var(--white);
      border-bottom: 4px solid var(--kkif-yellow);
      text-align: center;
      padding: 1.75rem 1.5rem 1.25rem;
    }

    .header-logo {
      width: 90px;
      height: auto;
      margin-bottom: .75rem;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .site-header h1 {
      font-size: clamp(1.4rem, 4.5vw, 2rem);
      font-weight: 800;
      color: var(--kkif-blue-dark);
      letter-spacing: -.3px;
      line-height: 1.15;
    }

    .site-header .sub {
      font-size: .85rem;
      color: var(--gray-500);
      margin-top: .25rem;
    }

    /* =========================================
       YEAR TABS
    ========================================= */
    .year-tabs-bar {
      background: var(--kkif-blue);
      display: flex;
      justify-content: center;
      gap: 0;
      border-bottom: 3px solid var(--kkif-yellow);
    }

    .year-tab {
      background: none;
      border: none;
      color: rgba(255,255,255,.65);
      font-size: .9rem;
      font-weight: 600;
      padding: .65rem 1.5rem;
      letter-spacing: .3px;
      transition: background .12s, color .12s;
      border-bottom: 3px solid transparent;
      margin-bottom: -3px;
    }

    .year-tab:hover { background: rgba(255,255,255,.08); color: white; }

    .year-tab.active {
      color: var(--white);
      border-bottom: 3px solid var(--kkif-yellow);
      background: rgba(255,255,255,.12);
    }

    /* =========================================
       LAYOUT
    ========================================= */
    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    .card {
      background: var(--white);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-md);
    }

    /* =========================================
       COMING SOON PANEL
    ========================================= */
    .coming-soon {
      text-align: center;
      padding: 4rem 2rem;
    }

    .coming-soon .cs-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }

    .coming-soon h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--kkif-blue-dark);
      margin-bottom: .5rem;
    }

    .coming-soon p { color: var(--gray-500); font-size: .9rem; }

    /* =========================================
       FILTER CARD
    ========================================= */
    .filter-card {
      padding: 1.25rem 1.5rem;
      margin-bottom: .875rem;
    }

    .filter-block { margin-bottom: 1rem; }
    .filter-block:last-child { margin-bottom: 0; }

    .filter-label {
      display: block;
      font-size: .67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--gray-400);
      margin-bottom: .5rem;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: .375rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: .3rem .75rem;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--r-full);
      background: var(--white);
      color: var(--gray-700);
      font-size: .8rem;
      font-weight: 500;
      transition: border-color .12s, background .12s, color .12s;
      white-space: nowrap;
      user-select: none;
    }

    .pill:hover {
      border-color: var(--kkif-blue);
      color: var(--kkif-blue);
    }

    .pill.active {
      background: var(--kkif-blue);
      border-color: var(--kkif-blue);
      color: var(--white);
      font-weight: 600;
    }

    /* =========================================
       STATUS BAR
    ========================================= */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      background: var(--kkif-blue-pale);
      border-radius: var(--r-md);
      border-left: 3px solid var(--kkif-blue);
      padding: .625rem 1rem;
      margin-bottom: .875rem;
      font-size: .875rem;
      color: var(--kkif-blue-dark);
    }

    .status-bar strong { font-weight: 700; }

    .btn-clear {
      flex-shrink: 0;
      background: none;
      border: 1.5px solid var(--kkif-blue);
      color: var(--kkif-blue);
      border-radius: var(--r-full);
      padding: .2rem .65rem;
      font-size: .76rem;
      font-weight: 600;
      transition: background .12s, color .12s;
      white-space: nowrap;
    }

    .btn-clear:hover { background: var(--kkif-blue); color: var(--white); }

    .hidden { display: none !important; }

    /* =========================================
       MATCH TABLE
    ========================================= */
    .table-card { overflow: hidden; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    .matches-table { width: 100%; border-collapse: collapse; }

    .matches-table thead th {
      background: var(--kkif-blue);
      color: var(--white);
      padding: .75rem 1rem;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      text-align: left;
      white-space: nowrap;
    }

    .matches-table tbody tr {
      border-bottom: 1px solid var(--gray-100);
      transition: background .08s;
    }

    .matches-table tbody tr:last-child { border-bottom: none; }
    .matches-table tbody tr:hover td { background: var(--kkif-blue-pale); }

    .matches-table tbody td {
      padding: .65rem 1rem;
      vertical-align: middle;
      font-size: .875rem;
    }

    .td-nr {
      color: var(--gray-400);
      font-size: .75rem;
      width: 38px;
      padding-right: .5rem;
    }

    .td-time {
      font-weight: 700;
      color: var(--gray-700);
      white-space: nowrap;
      font-size: .9rem;
      font-variant-numeric: tabular-nums;
    }

    .td-result {
      text-align: center;
      font-weight: 700;
      min-width: 70px;
      white-space: nowrap;
    }

    .td-result .dash { color: var(--gray-300); font-weight: 400; }

    /* =========================================
       GROUP BADGE
    ========================================= */
    .group-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: .8rem;
      font-weight: 800;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform .12s, box-shadow .12s;
    }

    .group-badge:hover {
      transform: scale(1.15);
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }

    .g-A        { background: #dbeafe; color: #1e3a8a; }
    .g-B        { background: #fce7f3; color: #831843; }
    .g-C        { background: #ffedd5; color: #7c2d12; }
    .g-D        { background: #ede9fe; color: #4c1d95; }
    .g-E        { background: #d1fae5; color: #064e3b; }
    .g-F        { background: #fdf4ff; color: #701a75; }
    .g-G        { background: #e0e7ff; color: #1e1b4b; }
    .g-H        { background: #fef3c7; color: #78350f; }
    .g-Slutspel { background: var(--kkif-yellow-light); color: var(--kkif-blue-dark); font-size: .65rem; font-weight: 700; }

    /* =========================================
       PLAN CHIP
    ========================================= */
    .plan-chip {
      display: inline-block;
      padding: .2rem .55rem;
      background: var(--kkif-blue-pale);
      border-radius: var(--r-sm);
      font-size: .8rem;
      font-weight: 500;
      color: var(--kkif-blue);
      cursor: pointer;
      white-space: nowrap;
      transition: background .12s, color .12s;
    }

    .plan-chip:hover { background: var(--kkif-blue); color: var(--white); }

    /* =========================================
       TEAM NAME
    ========================================= */
    .team-name {
      cursor: pointer;
      font-weight: 500;
      transition: color .12s;
    }

    .team-name:hover { color: var(--kkif-blue); text-decoration: underline; }

    .team-name.placeholder {
      color: var(--gray-400);
      font-style: italic;
      font-weight: 400;
      cursor: default;
    }

    .team-name.placeholder:hover { color: var(--gray-400); text-decoration: none; }

    /* =========================================
       MATCH TYPE BADGE
    ========================================= */
    .type-badge {
      font-size: .72rem;
      padding: .15rem .45rem;
      border-radius: 4px;
      font-weight: 500;
      white-space: nowrap;
    }

    .type-Gruppspel   { background: var(--gray-100); color: var(--gray-500); }
    .type-Kvartsfinal { background: var(--kkif-blue-light); color: var(--kkif-blue-dark); }
    .type-Semifinal   { background: var(--kkif-yellow-light); color: var(--kkif-blue-dark); }
    .type-Final       { background: var(--kkif-yellow); color: var(--kkif-black); font-weight: 700; }

    /* =========================================
       EMPTY STATE
    ========================================= */
    .empty-state {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--gray-400);
    }

    .empty-state .empty-icon { font-size: 2rem; margin-bottom: .5rem; }
    .empty-state p { font-size: .875rem; }

    /* =========================================
       FOOTER
    ========================================= */
    .site-footer {
      text-align: center;
      padding: 1.5rem 1rem 2rem;
      font-size: .78rem;
      color: var(--gray-400);
    }

    /* =========================================
       RESPONSIVE
    ========================================= */
    @media (max-width: 600px) {
      .site-header { padding: 1.5rem 1rem 1rem; }
      .container { padding: 1rem .75rem 2rem; }
      .filter-card { padding: 1rem; }
      .year-tab { padding: .55rem 1rem; font-size: .8rem; }
      .matches-table thead th,
      .matches-table tbody td { padding-left: .6rem; padding-right: .6rem; }
    }
  </style>
</head>

// =============================================================
// STATE
// =============================================================
let activeYear   = 2026;
let activeFilter = { type: null, value: null };

// =============================================================
// HELPERS
// =============================================================
function isPlaceholder(name) { return /^(Vinnare|Finalist)/i.test(name); }

function getGroups(matches) {
  const order = ["A","B","C","D","E","F","G","H","Slutspel"];
  const found = new Set(matches.map(m => m.group));
  return order.filter(g => found.has(g));
}

function getPlans(matches) {
  return [...new Set(matches.map(m => m.planNr))].sort((a,b) => a-b);
}

function getTeams(matches) {
  return [...new Set(matches.flatMap(m => [m.team1, m.team2]))]
    .filter(t => !isPlaceholder(t))
    .sort((a,b) => a.localeCompare(b,"sv"));
}

function filteredMatches(matches) {
  if (!activeFilter.type) return matches;
  return matches.filter(m => {
    if (activeFilter.type === "group") return m.group  === activeFilter.value;
    if (activeFilter.type === "plan")  return m.planNr === activeFilter.value;
    if (activeFilter.type === "team")  return m.team1  === activeFilter.value || m.team2 === activeFilter.value;
    return true;
  });
}

// =============================================================
// RENDER HELPERS
// =============================================================
function teamCell(name) {
  if (isPlaceholder(name)) return `<span class="team-name placeholder">${name}</span>`;
  return `<span class="team-name" data-filter-type="team" data-filter-value="${name}">${name}</span>`;
}

function groupBadge(g) {
  const label = g === "Slutspel" ? "🏆" : g;
  return `<span class="group-badge g-${g}" data-filter-type="group" data-filter-value="${g}" title="${g === "Slutspel" ? "Slutspel" : "Grupp " + g}">${label}</span>`;
}

// =============================================================
// RENDER SCHEDULE (one year)
// =============================================================
function renderSchedule(matches) {
  const groups  = getGroups(matches);
  const plans   = getPlans(matches);
  const teams   = getTeams(matches);
  const rows    = filteredMatches(matches);
  const total   = matches.length;

  // Status text
  let statusHTML = "";
  if (!activeFilter.type) {
    statusHTML = `Visar <strong>alla ${total} matcher</strong>`;
  } else {
    let desc = "";
    if (activeFilter.type === "group") desc = activeFilter.value === "Slutspel" ? "Slutspel" : "Grupp " + activeFilter.value;
    if (activeFilter.type === "plan")  desc = "Plan " + activeFilter.value;
    if (activeFilter.type === "team")  desc = activeFilter.value;
    statusHTML = `Visar <strong>${rows.length} ${rows.length === 1 ? "match" : "matcher"}</strong> för <strong>${desc}</strong>`;
  }

  const clearVisible = activeFilter.type ? "" : " hidden";

  // Table rows
  let tbodyHTML = "";
  if (rows.length === 0) {
    tbodyHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">🔍</div><p>Inga matcher hittades.</p></div></td></tr>`;
  } else {
    tbodyHTML = rows.map(m => `
      <tr>
        <td class="td-nr">${m.nr}</td>
        <td class="td-time">${m.time}</td>
        <td><span class="plan-chip" data-filter-type="plan" data-filter-value="${m.planNr}">Plan ${m.planNr}</span></td>
        <td>${groupBadge(m.group)}</td>
        <td><span class="type-badge type-${m.type}">${m.type}</span></td>
        <td>${teamCell(m.team1)}</td>
        <td class="td-result">${m.result || '<span class="dash">–</span>'}</td>
        <td>${teamCell(m.team2)}</td>
      </tr>`).join("");
  }

  const pillActive = (type, val) =>
    (activeFilter.type === type && activeFilter.value === val) ? " active" : "";

  return `
    <div class="card filter-card">
      <div class="filter-block">
        <span class="filter-label">Grupper</span>
        <div class="pills">
          ${groups.map(g => `<button class="pill${pillActive("group",g)}" data-filter-type="group" data-filter-value="${g}">${g === "Slutspel" ? "🏆 Slutspel" : "Grupp " + g}</button>`).join("")}
        </div>
      </div>
      <div class="filter-block">
        <span class="filter-label">Planer</span>
        <div class="pills">
          ${plans.map(p => `<button class="pill${pillActive("plan",p)}" data-filter-type="plan" data-filter-value="${p}">Plan ${p}</button>`).join("")}
        </div>
      </div>
      <div class="filter-block">
        <span class="filter-label">Lag</span>
        <div class="pills">
          ${teams.map(t => `<button class="pill${pillActive("team",t)}" data-filter-type="team" data-filter-value="${t}">${t}</button>`).join("")}
        </div>
      </div>
    </div>

    <div class="status-bar">
      <span id="status-text">${statusHTML}</span>
      <button class="btn-clear${clearVisible}" id="clear-btn" data-action="clear">✕ Rensa filter</button>
    </div>

    <div class="card table-card">
      <div class="table-scroll">
        <table class="matches-table">
          <thead>
            <tr>
              <th>#</th><th>Tid</th><th>Plan</th><th>Grupp</th><th>Typ</th>
              <th>Lag 1</th><th>Resultat</th><th>Lag 2</th>
            </tr>
          </thead>
          <tbody id="matches-body">${tbodyHTML}</tbody>
        </table>
      </div>
    </div>`;
}

// =============================================================
// RENDER COMING SOON
// =============================================================
function renderComingSoon(year) {
  return `
    <div class="card coming-soon">
      <span class="cs-icon">📅</span>
      <h2>Spelschema ${year} – Kommer snart</h2>
      <p>Spelschema för KKIF-dagen ${year} är inte publicerat ännu. Kom tillbaka senare!</p>
    </div>`;
}

// =============================================================
// RENDER MAIN
// =============================================================
function render() {
  // Update year tab active states
  document.querySelectorAll(".year-tab").forEach(btn => {
    btn.classList.toggle("active", parseInt(btn.dataset.year, 10) === activeYear);
  });

  // Update page title
  document.title = `KKIF-dagen ${activeYear}`;

  const matches = SCHEDULES[activeYear];
  const main    = document.getElementById("main-content");

  if (!matches) {
    main.innerHTML = renderComingSoon(activeYear);
  } else {
    main.innerHTML = renderSchedule(matches);
  }
}

// =============================================================
// EVENTS
// =============================================================
document.getElementById("year-tabs").addEventListener("click", function(e) {
  const tab = e.target.closest(".year-tab");
  if (!tab) return;
  const year = parseInt(tab.dataset.year, 10);
  if (year === activeYear) return;
  activeYear   = year;
  activeFilter = { type: null, value: null };
  render();
});

document.getElementById("main-content").addEventListener("click", function(e) {
  // Clear button
  if (e.target.closest("[data-action='clear']")) {
    activeFilter = { type: null, value: null };
    render();
    return;
  }

  const el = e.target.closest("[data-filter-type]");
  if (!el) return;

  const type  = el.dataset.filterType;
  let   value = el.dataset.filterValue;
  if (type === "plan") value = parseInt(value, 10);

  // Toggle off if same filter
  if (activeFilter.type === type && activeFilter.value === value) {
    activeFilter = { type: null, value: null };
  } else {
    activeFilter = { type, value };
  }

  render();
});

// =============================================================
// BOOT
// =============================================================
render();
</script>
